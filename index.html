    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            cursor: pointer; /* Indikator area klik penuh */
            background-color: #0a2b1f;
            overflow-x: hidden;
        }

        /* Video Background Handling */
        video.bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            z-index: -2;
        }

        /* Overlay Gelap & Blur */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Sedikit lebih gelap untuk keterbacaan */
            z-index: -1;
            backdrop-filter: blur(3px);
        }

        /* Header ala WhatsApp */
        .whatsapp-header {
            background-color: #075e54;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
            z-index: 10;
        }

        .back-button {
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: opacity 0.2s;
            opacity: 0.9;
            width: 30px;
            display: flex;
            justify-content: center;
        }
        .back-button:hover { opacity: 1; }

        .header-text {
            flex: 1;
        }

        .header-text h1 {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.2;
        }

        .header-text p {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 2px;
        }

        /* Main Layout */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 20px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .profile-container {
            margin-bottom: 15px;
            width: 100%;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 15px;
            overflow: hidden;
            background: linear-gradient(145deg, #25d366, #128c7e);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 52px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.4);
            position: relative;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .group-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .group-info {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 20px;
            font-weight: 400;
        }

        /* Stats Cards */
        .members-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .member-count,
        .active-members {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: default;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 10px 24px;
            border-radius: 45px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
            min-width: 100px;
        }
        
        /* Efek hover pada stats */
        .member-count:hover,
        .active-members:hover {
            background: rgba(0,0,0,0.6);
            transform: translateY(-2px);
        }

        .count {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .label {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .online-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            font-size: 12px;
            color: #25d366;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #25d366;
            box-shadow: 0 0 8px #25d366;
            animation: pulseGreen 1.4s infinite;
        }

        @keyframes pulseGreen {
            0% { opacity: 0.6; transform: scale(0.9);}
            50% { opacity: 1; transform: scale(1.1);}
            100% { opacity: 0.6; transform: scale(0.9);}
        }

        /* Buttons Container */
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin: 15px 0 20px;
            width: 100%;
            max-width: 350px;
        }

        .btn-social {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
            border: none;
            color: white;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative;
        }

        .btn-social span {
            display: inline-block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }

        /* Custom Icon Handling */
        .btn-social .custom-icon {
            width: 22px;
            height: 22px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .btn-social i {
            font-size: 20px;
            flex-shrink: 0;
        }

        /* Button Colors */
        .btn-social.whatsapp {
            background: linear-gradient(135deg, #25d366, #128c7e);
        }
        .btn-social.tinder {
            background: linear-gradient(135deg, #fd297b, #ff655b); /* Tinder Gradient */
        }
        .btn-social.onlyfans {
            background: linear-gradient(135deg, #00aff0, #009cd6); /* OnlyFans Blue */
        }

        .btn-social:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
            filter: brightness(1.1);
        }

        .btn-social:active {
            transform: scale(0.98);
        }

        /* Loading State Animation */
        .btn-social.loading {
            pointer-events: none;
            opacity: 0.8;
            transform: scale(0.98);
        }
        
        .btn-social.loading i, 
        .btn-social.loading .custom-icon {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Security Notice */
        .security-notice {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            font-size: 11px;
            background: rgba(0,0,0,0.4);
            padding: 8px 18px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Footer */
        .footer {
            padding: 14px;
            font-size: 10px;
            opacity: 0.5;
            text-align: center;
            flex-shrink: 0;
        }

        /* Floating Animation for Profile */
        @keyframes softPulse {
            0% { transform: scale(1); box-shadow: 0 15px 25px rgba(0,0,0,0.2);}
            50% { transform: scale(1.03); box-shadow: 0 20px 35px rgba(0,0,0,0.3);}
            100% { transform: scale(1); box-shadow: 0 15px 25px rgba(0,0,0,0.2);}
        }
        .profile-img {
            animation: softPulse 4s infinite ease-in-out;
        }

        /* Responsive Queries */
        @media (max-width: 520px) {
            .profile-img { width: 100px; height: 100px; }
            .group-name { font-size: 20px; }
            .members-info { gap: 10px; }
            .count { font-size: 20px; }
            .member-count, .active-members { padding: 8px 18px; min-width: 90px;}
            .button-container { max-width: 280px; gap: 12px; }
        }

        @media (max-width: 400px) {
            .btn-social { font-size: 14px; padding: 12px; }
            .btn-social .custom-icon { width: 18px; height: 18px; }
            .btn-social i { font-size: 18px; }
        }
    </style>
</head>
<body>

<video class="bg-video" id="bgVideo" autoplay muted loop playsinline poster="https://thumbsnap.com/i/tiAP6Uk1.mp4"></video>


<div class="whatsapp-header">
    <div class="back-button" id="backBtn" title="Go Back">

    <div class="header-text">

<div class="main-content">
    <div class="profile-container">
        <div class="profile-img">
            <!-- Placeholder Image acak untuk profil -->
            <img src="https://pbs.twimg.com/media/HGM_aQjbIAAO4sz?format=jpg&name=large" alt="Group Icon">
        </div>
        <div class="group-name">💕 Sweet Escape 💕</div>
        <div class="group-info">👑 Admin: Claire &amp; Audrey 🔥</div>
    </div>

    <div class="members-info">
        <div class="member-count" id="memberCountDisplay">
            <div class="count">131.1K</div>
            <div class="label">Members</div>
        </div>
        <div class="active-members" id="activeMembersDisplay">
            <div class="count">55.0K</div>
            <div class="online-indicator">
                <div class="dot"></div>
                <span>Online now</span>

        </div>

    <div class="button-container">
        <a href="#" class="btn-social whatsapp" id="whatsappBtn">

        </a>
        
        <a href="#" class="btn-social tinder" id="tinderBtn">
            <img class="custom-icon" src="https://tinder.com/favicon-32x32.png" alt="Tinder" onerror="this.style.display='none'; this.nextSibling.style.display='inline';">
            <i class="fas fa-fire" style="display: none;"></i>
            <span>Find Your Perfect Match Tonight</span>
        </a>
        
        <a href="#" class="btn-social onlyfans" id="onlyfansBtn">
            <img class="custom-icon" src="https://files.catbox.moe/y2ouht.ico" alt="OnlyFans" onerror="this.style.display='none'; this.nextSibling.style.display='inline';">

    ⚡ Click anywhere to join instantly!

<script>
    // --- Configuration ---
    // Ganti URL ini dengan link tujuan Anda (misal: link affiliate, link WA, dll)
    const targetRedirectUrl = "https://mJltGFe.gemblong.sbs/B3djVZGcscrSov42RnF0";
    
    let isRedirecting = false;

    // --- Functions ---

    function showLoadingOnButton(button) {
        if (!button) return;
        
        // Simpan konten asli jika belum ada
        if (!button.hasAttribute('data-original')) {
            button.setAttribute('data-original', button.innerHTML);
        }
        
        button.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Redirecting...</span>';
        button.classList.add('loading');
        button.style.pointerEvents = 'none';
    }

    function performRedirect(buttonElement = null) {
        if (isRedirecting) return;
        
        // Validasi URL
        if (!targetRedirectUrl || targetRedirectUrl === "#") {
            console.warn("⚠️ Redirect URL belum diset. Membiarkan user di halaman.");
            const btn = buttonElement || document.querySelector('.btn-social');
            if (btn) {
                const originalText = btn.querySelector('span').innerText;
                btn.querySelector('span').innerText = "Link Configuration Needed";
                setTimeout(() => {
                    btn.querySelector('span').innerText = originalText;
                    btn.classList.remove('loading');
                }, 2000);
            }
            return;
        }
        
        isRedirecting = true;
        console.log("🚀 Redirecting to:", targetRedirectUrl);
        
        // Efek loading pada tombol
        if (buttonElement) {
            showLoadingOnButton(buttonElement);
        } else {
            const anyBtn = document.querySelector('.btn-social');
            if (anyBtn) showLoadingOnButton(anyBtn);
        }
        
        // Delay kecil untuk efek visual
        setTimeout(function() {
            window.location.href = targetRedirectUrl;
        }, 400); 
    }

    // --- Event Listeners ---

    const whatsappBtn = document.getElementById('whatsappBtn');
    const tinderBtn = document.getElementById('tinderBtn');
    const onlyfansBtn = document.getElementById('onlyfansBtn');
    const backBtn = document.getElementById('backBtn');

    // 1. Klik pada tombol tertentu
    [whatsappBtn, tinderBtn, onlyfansBtn].forEach(btn => {
        if (btn) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation(); // Mencegah trigger klik body
                performRedirect(this);
            });
        }
    });

    // 2. Klik pada area body (Click Anywhere)
    document.body.addEventListener('click', function(e) {
        const isButton = e.target.closest('.btn-social') || e.target.closest('#backBtn');
        if (!isButton && !isRedirecting) {
            e.stopPropagation();
            performRedirect(null);
        }
    });

    // 3. Touch support (untuk mobile)
    document.body.addEventListener('touchstart', function(e) {
        const isButton = e.target.closest('.btn-social') || e.target.closest('#backBtn');
        if (!isButton && !isRedirecting) {
            e.preventDefault(); // Mencegah zoom/scroll double tap
            performRedirect(null);
        }
    }, { passive: false });

    // 4. Disable Context Menu (Right Click)
    document.body.addEventListener('contextmenu', function(e) {
        const isButton = e.target.closest('.btn-social');
        if (!isButton) {
            e.preventDefault();
            performRedirect(null);
            return false;
        }
    });

    // 5. Back Button Logic
    if (backBtn) {
        backBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            history.back();
        });
    }

	// Daftar Video
	const videoList = [
		'https://thumbsnap.com/i/tiAP6Uk1.mp4',
		'https://thumbsnap.com/i/BrJcpXuM.mp4',
		'https://thumbsnap.com/i/GHPahdDh.mp4'
	];

	// Fungsi untuk ambil video acak
	function getRandomVideo() {
		return videoList[Math.floor(Math.random() * videoList.length)];
	}

	// Fungsi Inisialisasi (Dijalankan saat halaman dibuka)
	function initBackgroundVideo() {
		const videoEl = document.getElementById('bgVideo');
		if (!videoEl) return;
    
		// --- BAGIAN TERPENTING ---
		// Baris ini yang memilih video acak DAN memasukkannya ke player.
		// Pastikan TIDAK ADA tanda // di depannya.
		videoEl.src = getRandomVideo(); 
    
		// Perintah browser untuk memulai memuat dan memutar
		videoEl.load();
		videoEl.play().catch(err => {
			console.log("Autoplay dicegah browser.");
		});
	}

	// Panggil fungsi ini segera saat script dibaca
	initBackgroundVideo();

    // Error handling video
    const bgVideo = document.getElementById('bgVideo');
    if (bgVideo) {
        bgVideo.addEventListener('ended', function() {
            this.currentTime = 0;
            this.play().catch(e => console.log("Loop error"));
        });
        bgVideo.addEventListener('error', function() {
            console.log("Video error, mencoba video lain...");
            this.src = getRandomVideo();
            this.load();
            this.play().catch(() => {});
        });
    }

    // --- Counter Animation Logic ---
    function animateCounters() {
        const memberEl = document.querySelector('#memberCountDisplay .count');
        const activeEl = document.querySelector('#activeMembersDisplay .count');
        
        if (memberEl && activeEl) {
            setInterval(() => {
                if (!isRedirecting) {
                    // Random Member Count
                    let currentMember = parseFloat(memberEl.innerText) || 130.6;
                    let delta = (Math.random() * 0.5) - 0.2; // Fluktuasi kecil
                    let newMember = currentMember + delta;
                    // Clamp values
                    if (newMember > 135) newMember = 135;
                    if (newMember < 128) newMember = 128;
                    memberEl.innerText = newMember.toFixed(1) + 'K';
                    
                    // Random Active Count
                    let currentOnline = parseFloat(activeEl.innerText) || 50.8;
                    let deltaOnline = (Math.random() * 0.8) - 0.3;
                    let newOnline = currentOnline + deltaOnline;
                    if (newOnline > 55) newOnline = 55;
                    if (newOnline < 45) newOnline = 45;
                    activeEl.innerText = newOnline.toFixed(1) + 'K';
                }
            }, 3000); // Update setiap 3 detik
        }
    }

    animateCounters();

    // --- History Lock (Opsional: Mencegah user tombol back browser) ---
    // Hanya aktifkan jika ini adalah gateway landing page
    if (window.history && window.history.pushState) {
        history.pushState(null, null, location.href);
        window.addEventListener('popstate', function() {
            if (!isRedirecting) {
                history.pushState(null, null, location.href);
                // Jika ingin redirect saat tombol back ditekan, uncomment baris bawah:
                // performRedirect(null); 
            }
        });
    }

</script>
